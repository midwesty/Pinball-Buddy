<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
  <title>Pinball Buddy</title>
  <style>
    * { box-sizing:border-box; margin:0; padding:0; }
    body {
      background:#000;color:#fff;font-family:monospace;
      min-height:100vh;display:flex;align-items:center;justify-content:center;
      overflow:hidden;
    }
    #lobby {
      text-align:center;padding:20px;max-width:520px;width:100%;
    }
    .pb-logo {
      font-size:clamp(28px,6vw,48px);font-weight:900;letter-spacing:0.1em;
      background:linear-gradient(135deg,#ff2070,#4400ff,#00d4ff);
      -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
      margin-bottom:6px;
    }
    .pb-tagline { color:#666;font-size:12px;margin-bottom:28px;letter-spacing:0.1em; }
    .table-grid { display:flex;flex-direction:column;gap:10px;margin-bottom:24px; }
    .table-card {
      background:#111;border:1px solid #333;border-radius:10px;
      padding:16px 20px;cursor:pointer;text-align:left;
      transition:border-color 0.15s,background 0.15s;
      display:flex;align-items:center;gap:16px;
    }
    .table-card:hover { border-color:#888;background:#181818; }
    .table-card:active { background:#222; }
    .table-icon {
      width:50px;height:50px;border-radius:8px;flex-shrink:0;
      display:flex;align-items:center;justify-content:center;font-size:24px;
    }
    .table-info { flex:1; }
    .table-name { font-size:16px;font-weight:bold;margin-bottom:2px; }
    .table-sub  { font-size:11px;color:#666; }
    .table-hi   { font-size:10px;margin-top:4px;color:#888; }
    .pb-footer  { color:#333;font-size:10px;margin-top:16px; }
    .pb-footer a { color:#555;text-decoration:none; }
    .controls-hint {
      background:#0a0a0a;border:1px solid #222;border-radius:8px;
      padding:10px 16px;margin-bottom:16px;font-size:10px;color:#555;
      display:grid;grid-template-columns:1fr 1fr;gap:4px;text-align:left;
    }
    .controls-hint span { color:#888; }
  </style>
</head>
<body>
<div id="lobby">
  <div class="pb-logo">PINBALL BUDDY</div>
  <div class="pb-tagline">3 TABLES · INFINITE TILT · ZERO EXCUSES</div>

  <div class="controls-hint">
    <div><span>← →</span> Arrow keys / Buttons</div>
    <div><span>Space</span> Plunger / Launch</div>
    <div><span>Touch</span> On-screen buttons</div>
    <div><span>Esc</span> Quit table</div>
  </div>

  <div class="table-grid" id="tableGrid"></div>

  <div class="pb-footer">
    Also playable inside SPACED · <a href="#">midwesty.github.io/Spaced</a>
  </div>
</div>

<script type="module">
import { openPinball } from './Pinball.js';

const TABLES = [
  {
    id:'worm_holer',
    name:'WORM HOLER',
    sub:'Survive the Singularity',
    icon:'🌀',
    accent:'#4400ff',
    bg:'linear-gradient(135deg,#110022,#000044)',
    desc:'Black holes, quantum leaps, and gravity wells.'
  },
  {
    id:'barfs_house',
    name:"BARF'S HOUSE",
    sub:"Based on the Hit TV Show!™",
    icon:'🍗',
    accent:'#ff6600',
    bg:'linear-gradient(135deg,#221100,#440800)',
    desc:"Serve chicken. Manage chaos. Don't get fired."
  },
  {
    id:'shower_defense',
    name:'SHOWER DEFENSE',
    sub:'Defend Your Drain!',
    icon:'🚿',
    accent:'#0088ff',
    bg:'linear-gradient(135deg,#001422,#002244)',
    desc:'Tower defense, but wetter. Much wetter.'
  },
];

const grid = document.getElementById('tableGrid');

TABLES.forEach(t => {
  const hi = JSON.parse(localStorage.getItem('pb_scores_' + t.id) || '[]');
  const hiScore = hi.length ? hi[0].score.toLocaleString() : '---';

  const card = document.createElement('div');
  card.className = 'table-card';
  card.style.borderColor = t.accent + '44';
  card.innerHTML = `
    <div class="table-icon" style="background:${t.bg};">${t.icon}</div>
    <div class="table-info">
      <div class="table-name" style="color:${t.accent}">${t.name}</div>
      <div class="table-sub">${t.sub}</div>
      <div class="table-hi">HIGH SCORE: ${hiScore} · ${t.desc}</div>
    </div>
    <div style="color:#555;font-size:18px">▶</div>
  `;
  card.addEventListener('click', () => openPinball(t.id));
  card.addEventListener('mouseenter', () => card.style.borderColor = t.accent);
  card.addEventListener('mouseleave', () => card.style.borderColor = t.accent+'44');
  grid.appendChild(card);
});
</script>
</body>
</html>
